<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOEIC Word Practice | Next Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#8E94F2', // ニュアンスのあるパープルブルー
                            primary: '#6366F1',
                            accent: '#F472B6'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #e4e8ff 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #2D3748;
        }
        
        html.dark {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #F7FAFC;
        }

        body {
            margin: 0;
            background: var(--bg-grad);
            height: 100vh;
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .app-shell {
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ふわっと浮き上がるようなカード */
        .modern-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .ios-btn:active { transform: scale(0.96); }

        /* スタイリッシュなプログレスバー */
        .progress-container {
            height: 6px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        html.dark .progress-container { background: rgba(255, 255, 255, 0.1); }

        /* ナビゲーションの改良 */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 700;
            color: #94A3B8;
        }
        .nav-item.active { color: #6366F1; }

        .home-hub {
            width: 64px;
            height: 64px;
            border-radius: 22px;
            background: #6366F1;
            color: white;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -30px;
            font-size: 1.5rem;
        }

        /* 単語カードのアニメーション強化 */
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        /* タイポグラフィ */
        .heading-xl { font-weight: 800; letter-spacing: -0.02em; }

        /* Aruki Mode の鼓動エフェクト */
        .pulse-mic {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="transition-colors duration-500">

<div class="app-shell">
    <header class="pt-12 px-8 pb-4 flex justify-between items-end">
        <div>
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-indigo-500 mb-1">Engrip Learning</p>
            <h1 class="text-3xl heading-xl">Vocabulary</h1>
        </div>
        <div class="text-xs font-bold text-gray-400" id="loading-msg">Loading...</div>
    </header>

    <div id="scr-level" class="flex-grow p-6 space-y-4 overflow-y-auto">
        <div class="grid grid-cols-1 gap-4 mt-4" id="level-btns">
            <div onclick="ctrl.setLevel(400)" class="ios-btn modern-card p-6 flex justify-between items-center bg-white/40">
                <div>
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-1">Step 01</p>
                    <h3 class="font-bold text-lg text-slate-800 dark:text-slate-100">400点級 <span class="text-sm font-normal text-slate-400 ml-2">基礎固め</span></h3>
                </div>
                <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500"><i class="fas fa-seedling"></i></div>
            </div>
            <div onclick="ctrl.setLevel(600)" class="ios-btn modern-card p-6 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest mb-1">Step 02</p>
                    <h3 class="font-bold text-lg text-slate-800 dark:text-slate-100">600点級 <span class="text-sm font-normal text-slate-400 ml-2">中堅突破</span></h3>
                </div>
                <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500"><i class="fas fa-unlocked"></i></div>
            </div>
            <div onclick="ctrl.setLevel(800)" class="ios-btn modern-card p-6 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-purple-500 uppercase tracking-widest mb-1">Step 03</p>
                    <h3 class="font-bold text-lg text-slate-800 dark:text-slate-100">800点級 <span class="text-sm font-normal text-slate-400 ml-2">高得点圏</span></h3>
                </div>
                <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-purple-500"><i class="fas fa-crown"></i></div>
            </div>
            <div onclick="ctrl.setLevel(900)" class="ios-btn modern-card p-6 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-rose-500 uppercase tracking-widest mb-1">Step 04</p>
                    <h3 class="font-bold text-lg text-slate-800 dark:text-slate-100">900点級 <span class="text-sm font-normal text-slate-400 ml-2">満点挑戦</span></h3>
                </div>
                <div class="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center text-rose-500"><i class="fas fa-fire"></i></div>
            </div>
        </div>
    </div>

    <div id="scr-mode" class="hidden flex-grow p-6">
        <button onclick="ctrl.showLevel()" class="mb-8 text-sm font-bold text-indigo-500 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Back</button>
        
        <div class="modern-card p-4 mb-8 flex justify-between items-center">
            <span class="text-xs font-bold opacity-50">Shuffle Setting</span>
            <select id="shuffle-select" class="bg-transparent text-sm font-bold outline-none text-indigo-600">
                <option value="random">Random Mix</option>
                <option value="mistake">Focus on Misses</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="ctrl.start(1)" class="ios-btn modern-card p-6 flex flex-col items-center justify-center gap-3">
                <div class="text-indigo-500 text-2xl"><i class="fas fa-font"></i></div>
                <p class="font-bold text-xs">英 → 日</p>
            </div>
            <div onclick="ctrl.start(2)" class="ios-btn modern-card p-6 flex flex-col items-center justify-center gap-3">
                <div class="text-emerald-500 text-2xl"><i class="fas fa-language"></i></div>
                <p class="font-bold text-xs">日 → 英</p>
            </div>
            <div onclick="ctrl.start(5)" class="ios-btn modern-card p-6 flex flex-col items-center justify-center gap-3">
                <div class="text-purple-500 text-2xl"><i class="fas fa-clone"></i></div>
                <p class="font-bold text-xs">Flash Card</p>
            </div>
            <div onclick="ctrl.start(6)" class="ios-btn modern-card p-6 flex flex-col items-center justify-center gap-3">
                <div class="text-orange-500 text-2xl"><i class="fas fa-walking"></i></div>
                <p class="font-bold text-xs">Aruki Mode</p>
            </div>
            <div onclick="ctrl.start(4)" class="col-span-2 ios-btn modern-card p-5 flex items-center justify-center gap-4 bg-indigo-500 text-white border-none">
                <i class="fas fa-sync-alt"></i>
                <span class="font-bold text-sm tracking-wide">Weak Point Review</span>
            </div>
        </div>
    </div>

    <div id="scr-quiz" class="hidden flex-grow flex flex-col p-6">
        <div class="flex justify-between items-center mb-4">
            <span id="quiz-mode-label" class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Standard Quiz</span>
            <span id="quiz-count" class="text-xs font-bold opacity-40">01 / 10</span>
        </div>
        <div class="progress-container mb-10">
            <div id="progress-fill" class="h-full bg-indigo-500 w-0 transition-all duration-500"></div>
        </div>

        <div id="mic-status" class="hidden text-center text-rose-500 font-bold pulse-mic text-[10px] mb-4">
            <i class="fas fa-microphone mr-1"></i> Listening for answer (1-4)...
        </div>

        <div class="modern-card p-10 mb-8 flex flex-col items-center relative overflow-hidden">
            <div class="absolute top-4 right-4">
                <button onclick="ctrl.speak()" class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center ios-btn"><i class="fas fa-volume-up"></i></button>
            </div>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter mb-2">Question</p>
            <h2 id="q-main-text" class="text-3xl font-bold text-center tracking-tight"></h2>
        </div>

        <div id="q-choices" class="space-y-3"></div>

        <div id="expl-panel" class="hidden fixed inset-x-0 bottom-0 z-[100] p-6 pb-12 modern-card rounded-b-none border-t-4 border-indigo-500 translate-y-0 transition-transform">
             <div class="flex justify-between items-start mb-4">
                <h4 class="font-bold text-indigo-600 text-sm">Explanation</h4>
                <button onclick="ctrl.next()" class="px-6 py-2 bg-indigo-600 text-white rounded-full font-bold text-xs ios-btn">Next Question</button>
             </div>
             <p id="expl-text" class="text-sm font-bold mb-4"></p>
             <div class="bg-indigo-50/50 dark:bg-slate-800 p-4 rounded-2xl mb-4">
                <p id="ex-en" class="text-sm italic text-indigo-700 dark:text-indigo-300 mb-1"></p>
                <p id="ex-ja" class="text-xs text-slate-500"></p>
             </div>
        </div>
    </div>

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl px-8 pt-4 pb-10 flex justify-between items-center border-t border-gray-100 dark:border-gray-800">
        <div onclick="ctrl.showMode()" class="nav-item active"><i class="fas fa-th-large text-xl"></i><span>Learn</span></div>
        <div onclick="ctrl.start(5)" class="nav-item"><i class="fas fa-clone text-xl"></i><span>Cards</span></div>
        
        <div onclick="ctrl.showLevel()" class="home-hub ios-btn"><i class="fas fa-home"></i></div>

        <div onclick="ctrl.start(6)" class="nav-item"><i class="fas fa-walking text-xl"></i><span>Aruki</span></div>
        <div onclick="ctrl.showAnalysis()" class="nav-item"><i class="fas fa-chart-bar text-xl"></i><span>Stats</span></div>
    </nav>
</div>

<script>
    /* ... 既存のスクリプト ctrl オブジェクトをここに配置 ... */
    /* デザイン変更に合わせて、ボタンのクラス名などを適宜修正 */
</script>

</body>
</html>
