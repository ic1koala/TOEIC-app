<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC Word Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-purple: #AF52DE;
            --ios-pink: #FF2D55;
            --glass: rgba(255, 255, 255, 0.7);
            --bg-grad: linear-gradient(160deg, #c1c1ff 0%, #ffd1ff 100%);
        }
        
        html.dark {
            --glass: rgba(30, 41, 59, 0.85);
            --bg-grad: linear-gradient(160deg, #1e1e2f 0%, #2a2a40 100%);
        }

        body {
            margin: 0;
            background: var(--bg-grad);
            height: 100vh;
            font-family: 'Merriweather', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            transition: background 0.5s ease;
        }
        .app-shell {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 1rem !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .ios-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-btn:active { transform: scale(0.95); opacity: 0.8; }
        
        .scroll-v { overflow-y: auto; scrollbar-width: none; height: 100%; }
        .scroll-v::-webkit-scrollbar { display: none; }
        
        .effect-mark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            pointer-events: none;
            display: none;
            font-size: 100px;
            font-weight: bold;
        }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        .bottom-nav {
            padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            z-index: 50;
        }

        .card-container { perspective: 1000px; }
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            width: 100%; height: 100%;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .card-back { transform: rotateY(180deg); }

        /* 追加：単語カードが飛んでいくアニメーション */
        .fly-up {
            transform: translateY(-150%) rotate(15deg) !important;
            opacity: 0;
            transition: transform 0.5s ease-in, opacity 0.5s ease-in !important;
        }
        .no-transition {
            transition: none !important;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="text-gray-900 dark:text-gray-100">

<div id="correct-effect" class="effect-mark text-red-500" style="animation: pop 0.6s ease-out;">○</div>
<div id="wrong-effect" class="effect-mark text-green-500" style="animation: pop 0.6s ease-out;">×</div>

<div class="app-shell">
    
    <div id="scr-level" class="flex-grow flex flex-col p-6 scroll-v">
        <h1 class="text-2xl font-black mt-8 mb-2 text-center w-full">TOEIC Word Practice</h1>
        <p class="text-xs text-gray-600 dark:text-gray-400 mb-8 text-center">目標レベルを選択してください</p>
        <div class="space-y-3">
            <div onclick="ctrl.setLevel(400)" class="ios-btn glass-card flex justify-between items-center dark:border-gray-600">
                <span class="font-bold text-sm">400点級 基礎固め</span><i class="fas fa-chevron-right text-blue-500 text-xs"></i>
            </div>
            <div onclick="ctrl.setLevel(600)" class="ios-btn glass-card flex justify-between items-center dark:border-gray-600">
                <span class="font-bold text-sm">600点級 中堅突破</span><i class="fas fa-chevron-right text-green-500 text-xs"></i>
            </div>
            <div onclick="ctrl.setLevel(800)" class="ios-btn glass-card flex justify-between items-center dark:border-gray-600">
                <span class="font-bold text-sm">800点級 高得点圏</span><i class="fas fa-chevron-right text-purple-500 text-xs"></i>
            </div>
            <div onclick="ctrl.setLevel(900)" class="ios-btn glass-card flex justify-between items-center dark:border-gray-600">
                <span class="font-bold text-sm">900点級 満点挑戦</span><i class="fas fa-chevron-right text-pink-500 text-xs"></i>
            </div>
        </div>
    </div>

    <div id="scr-mode" class="flex-grow hidden p-6 flex flex-col scroll-v">
        <button onclick="ctrl.showLevel()" class="text-blue-600 dark:text-blue-400 text-xs font-bold mb-6 flex items-center gap-1"><i class="fas fa-chevron-left"></i> 戻る</button>
        <h2 class="text-xl font-bold mb-6 text-center">トレーニング選択</h2>
        <div class="grid grid-cols-2 gap-3">
            <div onclick="ctrl.start(1)" class="ios-btn p-5 rounded-2xl text-white shadow-lg text-center" style="background: var(--ios-blue);"><i class="fas fa-font text-xl mb-2"></i><p class="font-bold text-xs">英 → 日</p></div>
            <div onclick="ctrl.start(2)" class="ios-btn p-5 rounded-2xl text-white shadow-lg text-center" style="background: var(--ios-green);"><i class="fas fa-language text-xl mb-2"></i><p class="font-bold text-xs">日 → 英</p></div>
            <div onclick="ctrl.start(5)" class="ios-btn p-5 rounded-2xl text-white shadow-lg text-center" style="background: var(--ios-purple);"><i class="fas fa-clone text-xl mb-2"></i><p class="font-bold text-xs">単語カード</p></div>
            <div onclick="ctrl.start(6)" class="ios-btn p-5 rounded-2xl text-white shadow-lg text-center bg-orange-500"><i class="fas fa-walking text-xl mb-2"></i><p class="font-bold text-xs">Aruki</p></div>
            <div onclick="ctrl.start(4)" class="col-span-2 ios-btn p-4 rounded-2xl text-white shadow-lg text-center" style="background: var(--ios-pink);"><i class="fas fa-redo mb-2"></i><p class="font-bold text-xs">弱点復習</p></div>
        </div>
    </div>

    <div id="scr-quiz" class="flex-grow hidden flex flex-col h-full overflow-hidden">
        <div class="px-6 pt-4 flex justify-between items-center">
            <span id="quiz-mode-label" class="text-[9px] font-black uppercase text-gray-400">Quiz</span>
            <span id="quiz-count" class="text-[10px] font-bold text-gray-500">1 / 10</span>
        </div>
        <div class="px-6 py-2"><div class="h-1 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"><div id="progress-fill" class="h-full bg-blue-500 w-0 transition-all duration-300"></div></div></div>
        
        <div id="mic-status" class="hidden text-center text-red-500 font-bold animate-pulse text-xs py-1"><i class="fas fa-microphone"></i> 答え（A, B, C, D）を発声してください</div>

        <div class="flex-grow scroll-v px-6 pt-2 pb-10">
            <div class="glass-card mb-4">
                <div class="flex justify-between items-center">
                    <h3 id="q-main-text" class="text-xl font-bold"></h3>
                    <button onclick="ctrl.speak()" class="ios-btn w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fas fa-volume-up"></i></button>
                </div>
            </div>
            <div id="q-choices" class="space-y-2 mb-6"></div>
            <div id="expl-panel" class="hidden glass-card border-l-4 border-blue-500 mb-10">
                <h4 class="font-black text-blue-600 text-[9px] uppercase mb-1">Explanation</h4>
                <p id="expl-text" class="text-xs text-gray-700 dark:text-gray-300 leading-relaxed mb-3"></p>
                <div class="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg text-[11px] space-y-2">
                    <p id="ex-en" class="text-blue-700 dark:text-blue-400 italic"></p>
                    <p id="ex-ja" class="text-gray-500 dark:text-gray-400"></p>
                </div>
                <button onclick="ctrl.next()" class="ios-btn w-full mt-4 py-3 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 rounded-xl font-bold text-sm">次へ</button>
            </div>
        </div>
    </div>

    <div id="scr-flashcard" class="hidden flex-grow flex flex-col items-center justify-center p-6 w-full relative">
        <button onclick="ctrl.showMode()" class="absolute top-4 left-6 text-blue-600 dark:text-blue-400 text-xs font-bold"><i class="fas fa-times"></i> 終了</button>
        <div class="card-container w-full max-w-sm aspect-video mb-8" onclick="this.querySelector('.card-inner').classList.toggle('flipped')">
            <div class="card-inner glass-card p-0 rounded-3xl border-2 border-blue-400 dark:border-blue-600 cursor-pointer shadow-xl">
                <div class="card-front text-3xl font-black text-gray-900 dark:text-white"><span id="fc-en">Word</span></div>
                <div class="card-back px-6 text-center w-full overflow-hidden">
                    <span id="fc-ja" class="text-2xl font-bold text-blue-600 dark:text-blue-400 mb-2 block">意味</span>
                    <div id="fc-ex" class="text-[11px] text-gray-600 dark:text-gray-300 w-full"></div>
                </div>
            </div>
        </div>
        <p class="text-[10px] text-gray-400 mb-4">カードをタップして裏返す</p>
        <button onclick="ctrl.nextFlash()" class="ios-btn w-3/4 py-4 bg-blue-600 text-white rounded-full font-black text-sm shadow-lg">次のカードへ</button>
    </div>

    <div id="scr-result" class="flex-grow hidden flex flex-col p-6 scroll-v">
        <div class="glass-card text-center mb-4">
            <h2 class="text-4xl font-black mb-1"><span id="res-score">0</span>/10</h2>
            <p id="analysis-summary" class="text-xs text-gray-500 dark:text-gray-400"></p>
        </div>
        <div class="glass-card mb-10">
            <h4 class="text-xs font-bold mb-3 text-center border-b border-gray-300 dark:border-gray-600 pb-2">要復習リスト (間違えた単語)</h4>
            <div id="wrong-list" class="space-y-2 max-height-60"></div>
        </div>
        <button onclick="ctrl.showMode()" class="ios-btn w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-sm">メニューへ戻る</button>
    </div>

    <div class="bottom-nav glass-card rounded-none rounded-t-[30px] flex justify-around items-center pt-3 pb-8 w-full shrink-0">
        <div onclick="ctrl.showMode()" class="text-blue-600 dark:text-blue-400 flex flex-col items-center ios-btn"><i class="fas fa-pencil-alt text-lg"></i><span class="text-[9px] font-bold mt-1">学習</span></div>
        <div onclick="ctrl.start(5)" class="text-gray-400 dark:text-gray-300 flex flex-col items-center ios-btn"><i class="fas fa-clone text-lg"></i><span class="text-[9px] font-bold mt-1">カード</span></div>
        <div onclick="ctrl.start(6)" class="text-gray-400 dark:text-gray-300 flex flex-col items-center ios-btn"><i class="fas fa-walking text-lg"></i><span class="text-[9px] font-bold mt-1">Aruki</span></div>
        <div onclick="ctrl.showAnalysis()" class="text-gray-400 dark:text-gray-300 flex flex-col items-center ios-btn"><i class="fas fa-chart-pie text-lg"></i><span class="text-[9px] font-bold mt-1">分析</span></div>
    </div>
</div>

<script>
const DB = {
    400: {
        words: [
            {en: "Purchase", ja: "購入する", ex: "buyの硬い表現。レシート等で頻出。", sEn: "Keep your receipt as proof of purchase.", sJa: "購入の証明としてレシートを保管してください。"},
            {en: "Available", ja: "利用可能な", ex: "在庫や予約状況を指す基本語。", sEn: "The service is available 24 hours a day.", sJa: "そのサービスは24時間利用可能です。"},
            {en: "Submit", ja: "提出する", ex: "公式に書類を出す動作。", sEn: "Please submit the report by Friday.", sJa: "金曜日までにレポートを提出してください。"},
            {en: "Equipment", ja: "設備、備品", ex: "オフィスや工場の機械。", sEn: "Our office has the latest IT equipment.", sJa: "オフィスには最新のIT設備があります。"},
            {en: "Require", ja: "必要とする", ex: "ルールや条件で求められること。", sEn: "A valid passport is required.", sJa: "有効なパスポートが必要です。"},
            {en: "Confirm", ja: "確認する", ex: "予約や決定を確実にすること。", sEn: "I'd like to confirm my flight.", sJa: "フライトの確認をしたいのですが。"},
            {en: "Instruction", ja: "指示、説明書", ex: "組み立て方ややり方。", sEn: "Please follow the instructions carefully.", sJa: "説明書に注意深く従ってください。"},
            {en: "Refund", ja: "払い戻し", ex: "お金を返してもらうこと。", sEn: "You can ask for a full refund.", sJa: "全額払い戻しを求めることができます。"},
            {en: "Feedback", ja: "意見、感想", ex: "アンケート等での顧客の生の声。", sEn: "We appreciate your valuable feedback.", sJa: "貴重なご意見に感謝いたします。"},
            {en: "Participate", ja: "参加する", ex: "joinの硬い表現。", sEn: "Many people participated in the event.", sJa: "多くの人がそのイベントに参加しました。"}
        ]
    },
    600: {
        words: [
            {en: "Approximately", ja: "おおよそ", ex: "数値の前に置く丁寧な副詞。", sEn: "It will take approximately three months.", sJa: "おおよそ3ヶ月かかります。"},
            {en: "Implement", ja: "実施する", ex: "計画やシステムを動かし始める。", sEn: "We will implement the new policy.", sJa: "新しい方針を導入します。"},
            {en: "Procedure", ja: "手続き、手順", ex: "一連の公式な流れ。", sEn: "What is the procedure for a visa?", sJa: "ビザ申請の手続きは何ですか？"},
            {en: "Significant", ja: "かなりの、重要な", ex: "目に見えて大きい変化。", sEn: "A significant increase in sales.", sJa: "売上の大幅な増加。"},
            {en: "Appreciate", ja: "感謝する", ex: "ビジネスメールで頻繁に使う。", sEn: "I appreciate your prompt reply.", sJa: "迅速なご返信に感謝します。"},
            {en: "Investigate", ja: "調査する", ex: "原因や事実を詳しく調べること。", sEn: "We are investigating the issue.", sJa: "現在その問題を調査中です。"},
            {en: "Negotiate", ja: "交渉する", ex: "価格や条件を話し合って決める。", sEn: "We managed to negotiate a better price.", sJa: "より良い価格を交渉できました。"},
            {en: "Proposal", ja: "提案", ex: "企画書や提案書。", sEn: "They rejected our initial proposal.", sJa: "彼らは最初の提案を却下しました。"},
            {en: "Ensure", ja: "確実にする", ex: "ミスがないように保証する。", sEn: "Please ensure all windows are closed.", sJa: "すべての窓が閉まっているか確認してください。"},
            {en: "Evaluate", ja: "評価する", ex: "価値やパフォーマンスを測る。", sEn: "We will evaluate his performance.", sJa: "彼の業績を評価します。"}
        ]
    },
    800: {
        words: [
            {en: "Acquisition", ja: "買収、獲得", ex: "M&Aなどで使われるビジネス用語。", sEn: "The acquisition of the startup was finalized.", sJa: "スタートアップの買収が完了しました。"},
            {en: "Incentive", ja: "動機、報奨金", ex: "やる気を出すための特典。", sEn: "They offer a financial incentive.", sJa: "彼らは金銭的な報奨金を提供しています。"},
            {en: "Substantial", ja: "相当な", ex: "量や価値が非常に大きいこと。", sEn: "The team made substantial progress.", sJa: "チームは相当な進歩を遂げました。"},
            {en: "Comply", ja: "遵守する", ex: "規則や法律を守ること。", sEn: "All products must comply with regulations.", sJa: "全製品が規制を遵守する必要があります。"},
            {en: "Delegate", ja: "委任する", ex: "部下などに仕事を任せること。", sEn: "Managers need to delegate tasks.", sJa: "マネージャーはタスクを委任する必要があります。"},
            {en: "Innovative", ja: "革新的な", ex: "新しくて画期的なアイデア。", sEn: "An innovative approach to marketing.", sJa: "マーケティングへの革新的なアプローチ。"},
            {en: "Mandatory", ja: "義務的な", ex: "絶対にやらなければならないこと。", sEn: "Attendance at the meeting is mandatory.", sJa: "会議への出席は義務です。"},
            {en: "Lucrative", ja: "儲かる", ex: "利益がたくさん出るビジネスなど。", sEn: "She started a lucrative business.", sJa: "彼女は儲かるビジネスを始めました。"},
            {en: "Facilitate", ja: "促進する", ex: "物事をスムーズに進めること。", sEn: "The new software will facilitate the process.", sJa: "新ソフトがプロセスを促進します。"},
            {en: "Preliminary", ja: "予備の、事前の", ex: "本番前の一時的な段階。", sEn: "We received the preliminary results.", sJa: "事前結果を受け取りました。"}
        ]
    },
    900: {
        words: [
            {en: "Stringent", ja: "厳格な", ex: "規律が非常にタイトな状態。", sEn: "The airport has stringent security.", sJa: "空港は厳格なセキュリティをとっています。"},
            {en: "Prerequisite", ja: "必須条件", ex: "何かをする前に必要な条件。", sEn: "A degree is a prerequisite for this position.", sJa: "学位はこの職種の必須条件です。"},
            {en: "Discretion", ja: "裁量、判断", ex: "自分の判断で決めて良い権利。", sEn: "Bonus amounts are at the manager's discretion.", sJa: "ボーナス額はマネージャーの裁量によります。"},
            {en: "Mitigate", ja: "和らげる", ex: "リスクや被害を小さくすること。", sEn: "We need a plan to mitigate the risk.", sJa: "リスクを軽減する計画が必要です。"},
            {en: "Discrepancy", ja: "相違、不一致", ex: "数字やデータが合わないこと。", sEn: "There is a discrepancy in the report.", sJa: "レポートに相違があります。"},
            {en: "Reimburse", ja: "払い戻す", ex: "経費などを会社が後で支払うこと。", sEn: "The company will reimburse your travel expenses.", sJa: "会社が交通費を払い戻します。"},
            {en: "Solicit", ja: "求める", ex: "意見や寄付を強くお願いすること。", sEn: "They are soliciting donations for the charity.", sJa: "彼らは慈善活動の寄付を求めています。"},
            {en: "Deteriorate", ja: "悪化する", ex: "状況や天候が徐々に悪くなること。", sEn: "The weather condition began to deteriorate.", sJa: "天候が悪化し始めました。"},
            {en: "Unprecedented", ja: "前例のない", ex: "これまで一度も起きたことがない。", sEn: "An unprecedented level of success.", sJa: "前例のないレベルの成功。"},
            {en: "Expedite", ja: "早める", ex: "プロセスや配送を迅速に行うこと。", sEn: "Please expedite the shipping process.", sJa: "配送プロセスを早めてください。"}
        ]
    }
};

const ctrl = {
    state: { level: 400, mode: 1, idx: 0, score: 0, questions: [], wrongPool: [], recog: null, flashcardInit: false },

    init: () => {
        const h = new Date().getHours();
        if (h >= 18 || h < 7) document.documentElement.classList.add('dark');
    },

    switchScr: (id) => {
        ctrl.stopVoice();
        window.speechSynthesis.cancel();
        ['scr-level', 'scr-mode', 'scr-quiz', 'scr-result', 'scr-flashcard'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },

    showLevel: () => ctrl.switchScr('scr-level'),
    showMode: () => ctrl.switchScr('scr-mode'),
    showAnalysis: () => { ctrl.updateAnalysisUI(); ctrl.switchScr('scr-result'); },

    setLevel: (l) => { ctrl.state.level = l; ctrl.showMode(); },

    start: (mode) => {
        ctrl.state.mode = mode;
        ctrl.state.idx = 0;
        ctrl.state.score = 0;
        const data = DB[ctrl.state.level] || DB[400];
        
        if (mode === 4) {
            if (ctrl.state.wrongPool.length === 0) { alert("弱点はありません！"); return; }
            ctrl.state.questions = [...ctrl.state.wrongPool].sort(() => Math.random() - 0.5);
        } else {
            ctrl.state.questions = ctrl.buildQs(mode, data.words);
        }

        if (mode === 5) { // 単語カード
            ctrl.state.flashcardInit = false; // 初期化フラグ
            ctrl.switchScr('scr-flashcard');
            ctrl.nextFlash();
        } else {
            ctrl.switchScr('scr-quiz');
            ctrl.render();
        }
    },

    buildQs: (mode, words) => {
        return words.map(w => {
            let q = (mode === 1 || mode === 6) ? w.en : w.ja;
            let a = (mode === 1 || mode === 6) ? w.ja : w.en;
            let pool = words.filter(x => x.en !== w.en).map(x => (mode === 1 || mode === 6 ? x.ja : x.en));
            let opts = [a, ...pool.slice(0, 3)].sort(() => Math.random() - 0.5);
            return { ...w, q, a, opts };
        }).sort(() => Math.random() - 0.5).slice(0, 10);
    },

    // 変更：正解時のピンポン音を作成
    playCorrectSound: () => {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1046.50, ctx.currentTime); // C6
            osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.15); // E6
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.5);
        } catch(e) {}
    },

    // 変更：不正解時のOh...音を作成
    playWrongSound: () => {
        const msg = new SpeechSynthesisUtterance("Oh...");
        msg.lang = 'en-US';
        msg.pitch = 0.5;
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    },

    startVoice: () => {
        document.getElementById('mic-status').classList.remove('hidden');
        if (!('webkitSpeechRecognition' in window)) {
            alert("このブラウザは音声認識非対応です（Safari/Chrome推奨）。");
            return;
        }
        if (!ctrl.state.recog) {
            ctrl.state.recog = new webkitSpeechRecognition();
            ctrl.state.recog.continuous = true;
            ctrl.state.recog.lang = 'ja-JP';
            ctrl.state.recog.onresult = (e) => {
                const res = e.results[e.results.length - 1][0].transcript.toUpperCase();
                if (res.includes('A') || res.includes('エー')) ctrl.triggerVoiceAnswer(0);
                else if (res.includes('B') || res.includes('ビー')) ctrl.triggerVoiceAnswer(1);
                else if (res.includes('C') || res.includes('シー')) ctrl.triggerVoiceAnswer(2);
                else if (res.includes('D') || res.includes('ディー')) ctrl.triggerVoiceAnswer(3);
            };
        }
        ctrl.state.recog.start();
    },

    stopVoice: () => {
        document.getElementById('mic-status').classList.add('hidden');
        if (ctrl.state.recog) ctrl.state.recog.stop();
    },

    triggerVoiceAnswer: (index) => {
        const btns = document.querySelectorAll('#q-choices div');
        if (btns[index] && document.getElementById('expl-panel').classList.contains('hidden')) {
            btns[index].click(); // 自動クリック
        }
    },

    render: () => {
        const q = ctrl.state.questions[ctrl.state.idx];
        document.getElementById('quiz-count').innerText = `${ctrl.state.idx + 1} / ${ctrl.state.questions.length}`;
        document.getElementById('progress-fill').style.width = `${((ctrl.state.idx + 1) / ctrl.state.questions.length) * 100}%`;
        document.getElementById('q-main-text').innerText = q.q;
        document.getElementById('expl-panel').classList.add('hidden');
        document.getElementById('quiz-mode-label').innerText = ctrl.state.mode === 6 ? "Aruki Mode" : "Quiz";

        const choiceArea = document.getElementById('q-choices');
        choiceArea.innerHTML = "";
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = "ios-btn glass-card flex items-center font-bold text-sm py-4 mb-3 border dark:border-gray-600";
            btn.innerHTML = `<span class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-200 flex items-center justify-center text-xs mr-4">${String.fromCharCode(65+i)}</span> <span class="flex-1">${opt}</span>`;
            btn.onclick = () => ctrl.check(btn, opt);
            choiceArea.appendChild(btn);
        });

        // 変更：Arukiモードの読み上げ順序・タイミングの修正（スキップバグ対応）
        if (ctrl.state.mode === 6) {
            window.speechSynthesis.cancel();
            ctrl.stopVoice(); // マイクの誤検知を防ぐため一旦停止

            const msgWord = new SpeechSynthesisUtterance(q.en);
            msgWord.lang = 'en-US';
            msgWord.rate = 0.85;
            msgWord.onend = () => {
                // 2秒待ってから選択肢を読み上げ
                setTimeout(() => {
                    const optsText = `A、${q.opts[0]}。 B、${q.opts[1]}。 C、${q.opts[2]}。 D、${q.opts[3]}。`;
                    const msgOpts = new SpeechSynthesisUtterance(optsText);
                    msgOpts.lang = 'ja-JP';
                    msgOpts.rate = 0.9;
                    msgOpts.onend = () => {
                        // 選択肢を読み終わってからマイクをオンにする
                        ctrl.startVoice();
                    };
                    window.speechSynthesis.speak(msgOpts);
                }, 2000);
            };
            window.speechSynthesis.speak(msgWord);
        }
    },

    check: (btn, val) => {
        const q = ctrl.state.questions[ctrl.state.idx];
        const isCorrect = (val === q.a);
        const btns = document.querySelectorAll('#q-choices div');
        btns.forEach(b => b.onclick = null);

        // Arukiモードの場合の処理
        if (ctrl.state.mode === 6) {
            ctrl.stopVoice(); // 正解が入ったらマイクをすぐ止める
            window.speechSynthesis.cancel();
            if (isCorrect) ctrl.playCorrectSound();
            else ctrl.playWrongSound();
        }

        if (isCorrect) {
            ctrl.state.score++;
            btn.classList.add('border-green-500', 'bg-green-50', 'dark:bg-green-900');
            ctrl.triggerEffect('correct-effect');
        } else {
            btn.classList.add('border-red-500', 'bg-red-50', 'dark:bg-red-900');
            ctrl.triggerEffect('wrong-effect');
            if(!ctrl.state.wrongPool.some(x => x.en === q.en)) ctrl.state.wrongPool.push(q);
        }

        document.getElementById('expl-text').innerText = q.ex;
        document.getElementById('ex-en').innerText = q.sEn;
        document.getElementById('ex-ja').innerText = q.sJa;
        document.getElementById('expl-panel').classList.remove('hidden');
        
        let stats = JSON.parse(localStorage.getItem('toeic_v2')) || { total: 0, correct: 0 };
        stats.total++; if(isCorrect) stats.correct++;
        localStorage.setItem('toeic_v2', JSON.stringify(stats));

        // Arukiモードは音声を待ってから自動で次へ（以前の固定3.5秒スキップバグを解消）
        if (ctrl.state.mode === 6) {
            setTimeout(() => ctrl.next(), 2500); 
        }
    },

    triggerEffect: (id) => {
        const el = document.getElementById(id);
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 600);
    },

    // 変更：単語カードが飛んでいくアニメーションと内容の修正
    nextFlash: () => {
        const cardInner = document.querySelector('.card-inner');
        const cardContainer = document.querySelector('.card-container');

        // 初回表示時はアニメーションさせない
        if (!ctrl.state.flashcardInit) {
            ctrl.state.flashcardInit = true;
            ctrl.updateFlashcardContent();
            return;
        }

        // 上に飛んでいくアニメーション付与
        cardContainer.classList.add('fly-up');

        setTimeout(() => {
            ctrl.state.idx++;
            if(ctrl.state.idx >= ctrl.state.questions.length) ctrl.state.idx = 0;
            
            // 見えない状態で元の位置に戻し、内容を更新
            cardContainer.classList.add('no-transition');
            cardContainer.classList.remove('fly-up');
            cardInner.classList.remove('flipped');
            ctrl.updateFlashcardContent();
            
            // 一瞬待ってからトランジションを復活（ふわっと表示させる）
            setTimeout(() => {
                cardContainer.classList.remove('no-transition');
            }, 50);
        }, 500); // CSSのtransition時間と合わせる
    },

    updateFlashcardContent: () => {
        const q = ctrl.state.questions[ctrl.state.idx];
        document.getElementById('fc-en').innerText = q.en;
        document.getElementById('fc-ja').innerText = q.ja;
        // 説明と例文を構造的に挿入
        document.getElementById('fc-ex').innerHTML = `
            <div class="mb-2 text-left bg-gray-50 dark:bg-gray-800 p-2 rounded">
                <span class="font-bold text-gray-700 dark:text-gray-200 block mb-1">説明:</span> ${q.ex}
            </div>
            <div class="text-left bg-blue-50 dark:bg-blue-900/30 p-2 rounded">
                <span class="italic text-blue-700 dark:text-blue-300 block mb-1">${q.sEn}</span>
                <span class="text-gray-600 dark:text-gray-400">${q.sJa}</span>
            </div>
        `;
    },

    updateAnalysisUI: () => {
        const stats = JSON.parse(localStorage.getItem('toeic_v2')) || { total: 0, correct: 0 };
        const rate = stats.total > 0 ? ((stats.correct/stats.total)*100).toFixed(1) : 0;
        document.getElementById('analysis-summary').innerText = `通算正解率: ${rate}% (${stats.total}問中)`;
        
        const listEl = document.getElementById('wrong-list');
        listEl.innerHTML = "";
        ctrl.state.wrongPool.forEach(w => {
            const item = document.createElement('div');
            item.className = "flex justify-between p-3 border-b border-gray-200 dark:border-gray-700 text-xs";
            item.innerHTML = `<span class="font-bold text-blue-700 dark:text-blue-400">${w.en}</span><span class="text-gray-600 dark:text-gray-400">${w.ja}</span>`;
            listEl.appendChild(item);
        });
        if(ctrl.state.wrongPool.length === 0) listEl.innerHTML = "<p class='text-center text-gray-400 p-4'>まだ苦手な単語はありません！</p>";
    },

    next: () => {
        ctrl.state.idx++;
        if (ctrl.state.idx < ctrl.state.questions.length) ctrl.render();
        else ctrl.finish();
    },

    finish: () => {
        ctrl.stopVoice();
        document.getElementById('res-score').innerText = ctrl.state.score;
        ctrl.showAnalysis();
    },

    speak: (text) => {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text || ctrl.state.questions[ctrl.state.idx].en);
        msg.lang = 'en-US';
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }
};

ctrl.init();
</script>
</body>
</html>
