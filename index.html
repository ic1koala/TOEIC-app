<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オリジナルTOEIC対策テスト</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background-color: #f3f4f6;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .app-container {
      background-color: #ffffff;
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      padding: 30px;
      box-sizing: border-box;
      position: relative;
    }
    h1 {
      font-size: 20px;
      color: #1f2937;
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    
    /* レベル選択画面 */
    .level-btn {
      background-color: #1f2937;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .level-btn:hover { opacity: 0.8; }
    .level-btn .arrow { background-color: rgba(255,255,255,0.2); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    
    /* NYT専用ボタン */
    .nyt-btn {
      background: linear-gradient(135deg, #7C93C3, #A3B18A);
      background-size: 200% 200%;
      animation: gradientShift 5s ease infinite;
      margin-top: 20px;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    /* クイズ画面 */
    .question-area { margin-bottom: 24px; }
    .question-number { font-size: 14px; color: #6b7280; font-weight: bold; margin-bottom: 8px; }
    .question-text { font-size: 18px; line-height: 1.5; font-weight: bold; margin-bottom: 20px; }
    
    .choices-container { display: flex; flex-direction: column; gap: 12px; }
    .choice-btn {
      background-color: #ffffff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #3b82f6;
      background-color: #eff6ff;
    }
    .choice-btn:disabled { cursor: not-allowed; }
    .choice-btn.correct { background-color: #dcfce7; border-color: #22c55e; color: #166534; }
    .choice-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }

    .feedback { font-size: 18px; font-weight: bold; text-align: center; margin-top: 20px; min-height: 27px; }
    .feedback.text-green { color: #22c55e; }
    .feedback.text-red { color: #ef4444; }

    .next-btn, .action-btn {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background-color: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .next-btn:hover, .action-btn:hover { background-color: #1d4ed8; }
    .next-btn .arrow-icon { transition: transform 0.3s ease; }
    .next-btn:hover .arrow-icon { transform: translateX(5px); }
    .action-btn { display: flex; }

    /* 復習リスト */
    .review-item {
      background-color: #fffbeb;
      border-left: 4px solid #f59e0b;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
      font-size: 14px;
      position: relative;
    }
    .review-answer { color: #ef4444; font-weight: bold; margin-top: 8px; }
    
    /* 個別再挑戦ボタン */
    .retry-btn {
      margin-top: 10px;
      padding: 6px 12px;
      background-color: #f59e0b;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
    }
    .retry-btn:hover { background-color: #d97706; }

    .hidden { display: none !important; }
    .nav-back { color: #6b7280; text-decoration: none; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 4px; margin-bottom: 15px;}
  </style>
</head>
<body>

  <div class="app-container">
    
    <div id="home-screen">
      <h1>Word Focus</h1>
      <p style="text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 20px;">目標レベルを選択してください</p>
      
      <button class="level-btn" onclick="startStandardQuiz(400)">
        <span>400点級 基礎固め</span><span class="arrow"><i class="fas fa-arrow-right"></i></span>
      </button>
      <button class="level-btn" onclick="startStandardQuiz(600)">
        <span>600点級 中堅突破</span><span class="arrow"><i class="fas fa-arrow-right"></i></span>
      </button>
      <button class="level-btn" onclick="startStandardQuiz(800)">
        <span>800点級 高得点圏</span><span class="arrow"><i class="fas fa-arrow-right"></i></span>
      </button>
      <button class="level-btn" onclick="startStandardQuiz(900)">
        <span>900点級 満点挑戦</span><span class="arrow"><i class="fas fa-arrow-right"></i></span>
      </button>
      
      <button class="level-btn nyt-btn" onclick="startNYTQuiz()">
        <div>
          <span style="display:block;"><i class="far fa-newspaper"></i> 本日のNYTニュース単語</span>
          <span style="font-size: 11px; font-weight: normal; opacity: 0.8;">AIが抽出した最新ニュース語彙をテスト</span>
        </div>
        <span class="arrow" style="background: rgba(0,0,0,0.2);"><i class="fas fa-arrow-right"></i></span>
      </button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="nav-back" onclick="goHome()"><i class="fas fa-chevron-left"></i> ホームへ戻る</div>
      <div class="question-area">
        <div id="q-number" class="question-number">Question 1 / 10</div>
        <div id="q-text" class="question-text">読み込み中...</div>
      </div>
      <div id="choices" class="choices-container"></div>
      <div id="feedback" class="feedback"></div>
      
      <button id="next-btn" class="next-btn" onclick="nextQuestion()">
        次の問題へ
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow-icon">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>
    </div>

    <div id="result-screen" class="hidden">
      <h2 style="text-align: center;">テスト終了！</h2>
      <p id="score-text" style="text-align: center; font-size: 24px; font-weight: bold; margin: 20px 0;"></p>
      
      <div id="review-area" class="hidden">
        <h3 style="font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">復習リスト（間違えた問題）</h3>
        <p style="font-size: 12px; color: #6b7280; margin-bottom: 10px;">「再挑戦」で正解するとリストから消えます。</p>
        <div id="review-list"></div>
      </div>

      <button class="action-btn" onclick="goHome()" style="margin-top: 30px; background-color: #1f2937;">
        メニューへ戻る
      </button>
    </div>

  </div>

  <script>
    // --- データの準備 ---
    // ここは本来はCSVや別ファイルから取得するイメージですが、今回は直書きでサンプルを用意しています。
    const standardData = [
      { id: 1, question: "The new software is designed to _______ the accounting process.", choices: ["streamline", "streamlines", "streamlined", "streamlining"], answerIndex: 0 },
      { id: 2, question: "Please ensure that all doors are locked _______ leaving the building.", choices: ["before", "after", "during", "while"], answerIndex: 0 },
      { id: 3, question: "Mr. Lee _______ the marketing department since last year.", choices: ["manages", "managed", "has managed", "will manage"], answerIndex: 2 }
    ];

    let currentQuizData = []; // 今からやるクイズの配列
    let currentIndex = 0;
    let score = 0;
    let mistakes = []; // 間違えた問題のストック（全体）

    // --- 画面切り替え関数 ---
    function goHome() {
      document.getElementById('home-screen').classList.remove('hidden');
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.add('hidden');
    }

    // --- 通常クイズ開始 ---
    function startStandardQuiz(level) {
      // 実際にはレベルに応じたデータをセットします
      currentQuizData = [...standardData];
      startQuizSession();
    }

    // --- NYTクイズ開始 ---
    async function startNYTQuiz() {
      document.getElementById('home-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      document.getElementById('q-text').textContent = "NYTデータ取得中...";
      document.getElementById('choices').innerHTML = "";
      document.getElementById('q-number').textContent = "Loading...";
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('feedback').textContent = '';

      try {
        // キャッシュを防いで最新のJSONを取得
        const res = await fetch('./data/nyt_quiz.json?t=' + new Date().getTime(), { cache: "no-store" });
        if (!res.ok) throw new Error("JSONが見つかりません。");
        const nytData = await res.json();
        
        if (!nytData.words || nytData.words.length === 0) {
          alert("ニュース単語がまだ生成されていません。");
          goHome();
          return;
        }

        // JSONデータをこのアプリの形式(question, choices, answerIndex)に変換する
        currentQuizData = nytData.words.map((item, index) => {
          // 英語の単語を問題とし、日本語の意味を答えとする
          const questionText = `次の英単語の意味として最も適切なものは？\n\n「 ${item.word} 」`;
          const correctAnswer = item.ja.split('(')[0].trim(); // 英語混じりの部分をカット
          
          // 他の単語の意味をダミー選択肢として使う（簡易的）
          let allJa = nytData.words.map(w => w.ja.split('(')[0].trim());
          let others = allJa.filter(ja => ja !== correctAnswer).sort(() => Math.random() - 0.5).slice(0, 3);
          
          // 正解とダミーを混ぜる
          let choices = [correctAnswer, ...others].sort(() => Math.random() - 0.5);
          let answerIndex = choices.indexOf(correctAnswer);

          return {
            id: 'nyt_' + index,
            question: questionText,
            choices: choices,
            answerIndex: answerIndex,
            originalWord: item.word
          };
        });

        startQuizSession();

      } catch (err) {
        alert("ニュース単語の読み込みに失敗しました。\nNAS側の設定を確認してください。");
        goHome();
      }
    }

    // --- クイズの進行 ---
    function startQuizSession() {
      document.getElementById('home-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      currentIndex = 0;
      score = 0;
      loadQuestion();
    }

    function loadQuestion() {
      const currentQ = currentQuizData[currentIndex];
      document.getElementById('q-number').textContent = `Question ${currentIndex + 1} / ${currentQuizData.length}`;
      document.getElementById('q-text').textContent = currentQ.question;
      
      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';
      document.getElementById('feedback').textContent = '';
      document.getElementById('next-btn').style.display = 'none';

      currentQ.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.textContent = choice;
        btn.className = 'choice-btn';
        btn.onclick = () => checkAnswer(index, btn);
        choicesEl.appendChild(btn);
      });
    }

    function checkAnswer(selectedIndex, selectedBtn) {
      const currentQ = currentQuizData[currentIndex];
      const choicesEl = document.getElementById('choices');
      const buttons = choicesEl.querySelectorAll('.choice-btn');
      const feedbackEl = document.getElementById('feedback');
      
      buttons.forEach(btn => btn.disabled = true);

      if (selectedIndex === currentQ.answerIndex) {
        selectedBtn.classList.add('correct');
        feedbackEl.textContent = '⭕️ Correct!';
        feedbackEl.className = 'feedback text-green';
        score++;
      } else {
        selectedBtn.classList.add('wrong');
        buttons[currentQ.answerIndex].classList.add('correct');
        feedbackEl.textContent = '❌ Incorrect';
        feedbackEl.className = 'feedback text-red';
        
        // 重複しないようにmistakesに追加
        if (!mistakes.some(m => m.id === currentQ.id)) {
          mistakes.push(currentQ);
        }
      }

      document.getElementById('next-btn').style.display = 'flex';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < currentQuizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    // --- 結果と復習リスト表示 ---
    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      
      document.getElementById('score-text').textContent = `${currentQuizData.length}問中 ${score}問 正解！`;

      renderReviewList();
    }

    function renderReviewList() {
      const reviewArea = document.getElementById('review-area');
      const reviewListEl = document.getElementById('review-list');
      reviewListEl.innerHTML = '';

      if (mistakes.length > 0) {
        reviewArea.classList.remove('hidden');
        mistakes.forEach((q, index) => {
          const item = document.createElement('div');
          item.className = 'review-item';
          item.id = `review-item-${q.id}`;
          
          const correctAnswerText = q.choices[q.answerIndex];
          
          item.innerHTML = `
            <div style="font-weight:bold; margin-bottom:5px;">${q.question}</div>
            <div class="review-answer">正解: ${correctAnswerText}</div>
            <button class="retry-btn" onclick="retryQuestion('${q.id}')">この問題に再挑戦する</button>
            <div id="retry-area-${q.id}" style="margin-top:10px; display:none;"></div>
          `;
          reviewListEl.appendChild(item);
        });
      } else {
        reviewArea.classList.add('hidden');
      }
    }

    // --- 個別の再挑戦ロジック ---
    function retryQuestion(targetId) {
      const q = mistakes.find(m => m.id == targetId);
      if(!q) return;

      const retryArea = document.getElementById(`retry-area-${targetId}`);
      retryArea.style.display = 'block';
      retryArea.innerHTML = '';

      // 選択肢を再度描画
      q.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.textContent = choice;
        btn.className = 'choice-btn';
        btn.style.width = '100%';
        btn.style.marginBottom = '5px';
        btn.onclick = () => {
          // すべてのボタンを無効化
          const allBtns = retryArea.querySelectorAll('.choice-btn');
          allBtns.forEach(b => b.disabled = true);

          if(index === q.answerIndex) {
            btn.classList.add('correct');
            setTimeout(() => {
              // 正解したらmistakesから削除し、リストを再描画
              mistakes = mistakes.filter(m => m.id != targetId);
              renderReviewList();
              if(mistakes.length === 0) alert("すべての復習が完了しました！");
            }, 800);
          } else {
            btn.classList.add('wrong');
            allBtns[q.answerIndex].classList.add('correct');
            setTimeout(() => {
              retryArea.style.display = 'none'; // 間違えたら一旦閉じる
            }, 1500);
          }
        };
        retryArea.appendChild(btn);
      });
    }

  </script>
</body>
</html>
