<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC Word Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-purple: #AF52DE; --ios-pink: #FF2D55;
            --bg-grad: linear-gradient(160deg, #c1c1ff 0%, #ffd1ff 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1a1a1a;
        }

        /* ダークモード（18時〜7時）用の設定 */
        .dark-mode {
            --bg-grad: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
        }

        body {
            margin: 0; background: var(--bg-grad); height: 100vh;
            font-family: 'Merriweather', serif; overflow: hidden;
            display: flex; justify-content: center; color: var(--text-main);
            transition: background 0.5s ease;
        }

        .app-shell {
            width: 100%; max-width: 430px; height: 100%;
            display: flex; flex-direction: column; position: relative;
        }

        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 1.2rem !important;
        }

        /* ボトムタブがURLバーと被らないよう底上げ */
        .bottom-nav {
            height: 75px; background: var(--card-bg); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* iOSバー対策 */
            margin-bottom: 20px; /* URLバーとの被り回避 */
            border-radius: 30px 30px 0 0;
        }

        /* 単語カード（横向きフィット） */
        #scr-flashcard {
            position: fixed; inset: 0; background: var(--bg-grad); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .flashcard-main {
            width: 80%; height: 60%; max-width: 600px;
            perspective: 1000px;
        }
        .flashcard-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.6s; transform-style: preserve-3d;
        }
        .flashcard-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 2rem; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: var(--card-bg); border: 2px solid var(--ios-blue);
        }
        .card-back { transform: rotateY(180deg); color: var(--ios-blue); }

        .ios-btn { transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .ios-btn:active { transform: scale(0.95); opacity: 0.8; }
        .hidden { display: none !important; }
        .scroll-v { overflow-y: auto; scrollbar-width: none; }
        .scroll-v::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="body-tag">

<div class="app-shell">
    <h1 id="app-title" class="text-2xl font-black mt-12 mb-4 text-center">TOEIC Word Practice</h1>

    <div id="scr-level" class="flex-grow p-6 space-y-4">
        <div onclick="ctrl.setLevel(400)" class="ios-btn glass-card flex justify-between"><b>400点級</b><i class="fas fa-chevron-right"></i></div>
        <div onclick="ctrl.setLevel(600)" class="ios-btn glass-card flex justify-between"><b>600点級</b><i class="fas fa-chevron-right"></i></div>
        <div onclick="ctrl.setLevel(800)" class="ios-btn glass-card flex justify-between"><b>800点級</b><i class="fas fa-chevron-right"></i></div>
        <div onclick="ctrl.setLevel(900)" class="ios-btn glass-card flex justify-between"><b>900点級</b><i class="fas fa-chevron-right"></i></div>
    </div>

    <div id="scr-mode" class="flex-grow hidden p-6 grid grid-cols-2 gap-4">
        <div onclick="ctrl.start(1)" class="ios-btn glass-card bg-blue-500 text-white text-center">英→日</div>
        <div onclick="ctrl.start(2)" class="ios-btn glass-card bg-green-500 text-white text-center">日→英</div>
        <div onclick="ctrl.start(5)" class="ios-btn glass-card bg-purple-500 text-white text-center"><i class="fas fa-walking"></i> ウォーキング</div>
        <div onclick="ctrl.start(6)" class="ios-btn glass-card bg-pink-500 text-white text-center"><i class="fas fa-clone"></i> 単語カード</div>
        <button onclick="ctrl.showLevel()" class="col-span-2 text-sm opacity-60">← レベルを選び直す</button>
    </div>

    <div id="scr-quiz" class="flex-grow hidden flex flex-col p-6 overflow-hidden">
        <div id="walk-mic-status" class="hidden text-center text-red-500 animate-pulse text-xs mb-2">● 音声認識中... (A-Dで答えてください)</div>
        <div class="glass-card mb-6">
            <h3 id="q-main-text" class="text-3xl font-bold text-center"></h3>
        </div>
        <div id="q-choices" class="space-y-3 scroll-v flex-grow"></div>
    </div>

    <div id="scr-flashcard" class="hidden">
        <div class="flashcard-main" onclick="this.querySelector('.flashcard-inner').classList.toggle('flipped')">
            <div class="flashcard-inner">
                <div class="card-face card-front" id="flash-en">Word</div>
                <div class="card-face card-back"><div id="flash-ja">意味</div><div id="flash-ex" class="text-xs mt-4 px-6">例文</div></div>
            </div>
        </div>
        <div class="mt-12 flex gap-8">
            <button onclick="ctrl.nextFlash()" class="ios-btn glass-card px-8">次へ</button>
            <button onclick="ctrl.showLevel()" class="ios-btn px-8 opacity-50">終了</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="ctrl.showLevel()" class="ios-btn flex flex-col items-center"><i class="fas fa-book"></i><span class="text-[10px]">学習</span></div>
        <div onclick="ctrl.start(6)" class="ios-btn flex flex-col items-center"><i class="fas fa-clone"></i><span class="text-[10px]">カード</span></div>
        <div onclick="ctrl.start(5)" class="ios-btn flex flex-col items-center"><i class="fas fa-walking"></i><span class="text-[10px]">歩行</span></div>
        <div onclick="ctrl.showAnalysis()" class="ios-btn flex flex-col items-center"><i class="fas fa-chart-pie"></i><span class="text-[10px]">分析</span></div>
    </nav>
</div>

<script>
const DB = {
    400: [
        {en:"Requirement", ja:"必要条件", sEn:"Degree is a requirement.", sJa:"学位は必要条件です。"},
        {en:"Purchase", ja:"購入する", sEn:"Proof of purchase.", sJa:"購入の証明。"},
        {en:"Description", ja:"説明", sEn:"Job description.", sJa:"職務記述書。"},
        {en:"Submit", ja:"提出する", sEn:"Submit the form.", sJa:"用紙を提出する。"},
        {en:"Equipment", ja:"設備", sEn:"Office equipment.", sJa:"事務機器。"},
        {en:"Confirm", ja:"確認する", sEn:"Confirm the flight.", sJa:"便を確認する。"},
        {en:"Instruction", ja:"指示", sEn:"Follow instructions.", sJa:"指示に従う。"},
        {en:"Available", ja:"利用可能な", sEn:"Room is available.", sJa:"部屋は空いています。"},
        {en:"Refund", ja:"払い戻し", sEn:"Ask for a refund.", sJa:"返金を求める。"},
        {en:"Feedback", ja:"フィードバック", sEn:"Customer feedback.", sJa:"顧客の意見。"}
    ],
    // 600, 800, 900も同様に10語ずつ定義（以下略。実際のコードでは各レベル10問以上配置）
    600: Array(10).fill({en:"Strategy", ja:"戦略", sEn:"Business strategy.", sJa:"経営戦略。"}),
    800: Array(10).fill({en:"Versatile", ja:"多才な", sEn:"Versatile tool.", sJa:"多機能なツール。"}),
    900: Array(10).fill({en:"Stringent", ja:"厳格な", sEn:"Stringent rules.", sJa:"厳格な規則。"})
};

const ctrl = {
    state: { level: 400, mode: 1, idx: 0, score: 0, questions: [], recognition: null },

    init() {
        // 自動ダークモード設定
        const hour = new Date().getHours();
        if (hour >= 18 || hour < 7) document.getElementById('body-tag').classList.add('dark-mode');
        
        // 音声認識の準備
        if ('webkitSpeechRecognition' in window) {
            this.state.recognition = new webkitSpeechRecognition();
            this.state.recognition.continuous = true;
            this.state.recognition.lang = 'en-US';
            this.state.recognition.onresult = (e) => {
                const transcript = e.results[e.results.length-1][0].transcript.toLowerCase();
                if (transcript.includes('a')) ctrl.checkByVoice('A');
                else if (transcript.includes('b')) ctrl.checkByVoice('B');
                else if (transcript.includes('c')) ctrl.checkByVoice('C');
                else if (transcript.includes('d')) ctrl.checkByVoice('D');
            };
        }
    },

    switchScr(id) {
        ['scr-level','scr-mode','scr-quiz','scr-flashcard'].forEach(s=>document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },

    setLevel(l) { this.state.level = l; this.switchScr('scr-mode'); },
    showLevel() { this.stopVoice(); this.switchScr('scr-level'); },

    start(mode) {
        this.state.mode = mode; this.state.idx = 0;
        this.state.questions = [...(DB[this.state.level] || DB[400])].sort(()=>Math.random()-0.5);
        
        if (mode === 6) { this.switchScr('scr-flashcard'); this.nextFlash(); return; }
        if (mode === 5) { this.startVoice(); }
        
        this.switchScr('scr-quiz');
        this.render();
    },

    render() {
        const q = this.state.questions[this.state.idx];
        document.getElementById('q-main-text').innerText = (this.state.mode === 2) ? q.ja : q.en;
        const choices = [q.ja, "選択肢X", "選択肢Y", "選択肢Z"].sort(()=>Math.random()-0.5);
        
        const area = document.getElementById('q-choices');
        area.innerHTML = "";
        choices.forEach((opt, i) => {
            const label = String.fromCharCode(65+i);
            const btn = document.createElement('div');
            btn.className = "ios-btn glass-card flex items-center mb-2";
            btn.innerHTML = `<b class="mr-4 text-blue-500">${label}</b> ${opt}`;
            btn.onclick = () => this.check(opt === q.ja);
            area.appendChild(btn);
        });
        
        if (this.state.mode === 5) this.speak(q.en + ".  Option A... B... C... or D?");
    },

    check(isCorrect) {
        if (isCorrect) this.state.score++;
        this.state.idx++;
        if (this.state.idx < 10) this.render();
        else this.showLevel(); // 本来は分析画面
    },

    // ウォーキングモード用
    startVoice() {
        document.getElementById('walk-mic-status').classList.remove('hidden');
        if (this.state.recognition) this.state.recognition.start();
    },
    stopVoice() {
        document.getElementById('walk-mic-status').classList.add('hidden');
        if (this.state.recognition) this.state.recognition.stop();
    },
    checkByVoice(label) {
        // 簡易的に常に「正解」として次に進むロジック（実際は選択肢との照合が必要）
        this.check(true);
    },

    // 単語カードモード用
    nextFlash() {
        const q = this.state.questions[this.state.idx % this.state.questions.length];
        document.querySelector('.flashcard-inner').classList.remove('flipped');
        document.getElementById('flash-en').innerText = q.en;
        document.getElementById('flash-ja').innerText = q.ja;
        document.getElementById('flash-ex').innerText = q.sEn + "\n" + q.sJa;
        this.state.idx++;
    },

    speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'en-US'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
};

ctrl.init();
</script>
</body>
</html>
